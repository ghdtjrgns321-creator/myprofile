<title>K-IFRS 1115 지식그래프 3D</title>
<style>

    --bg: #0d1220; --bg-glow: #131a2e;

    --ink: #dde4f5; --ink-dim: #8c97b8; --ink-faint: #5a6580;
    --concept: #5e8bff; --concept-b: #a583ff; --para: #7c8598;
    --qna: #3fb6d8; --finding: #e86a8a; --ie: #b9c94a; --bc: #8f9bc4; --term: #c9a86a;

    --bg: #f4f6fb; --bg-glow: #e8ecf6;
    --panel: rgba(255, 255, 255, 0.92); --panel-border: #d7deee;
    --ink: #1d2537; --ink-dim: #58627e; --ink-faint: #9aa3bc;
    --concept: #3565e0; --concept-b: #7a4fd8; --para: #8d95a8;

  html, body { height: 100%; }
  body {
    margin: 0; overflow: hidden; background: var(--bg);
    color: var(--ink);
    font-family: "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    font-size: 14px;
  }
  #stage { position: fixed; inset: 0; display: block; cursor: grab; }
  #stage.dragging { cursor: grabbing; }

  .card {
    position: fixed; z-index: 5;
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 10px; padding: 14px 16px;
    backdrop-filter: blur(6px);
  }
  #title-card { top: 16px; left: 16px; max-width: 300px; }
  #title-card .eyebrow {
    font-size: 11px; letter-spacing: 0.12em; color: var(--ink-dim);
    text-transform: uppercase; margin: 0 0 4px;
  }
  #title-card h1 { font-size: 17px; margin: 0 0 6px; font-weight: 600; }
  #title-card p { margin: 0; color: var(--ink-dim); font-size: 12.5px; line-height: 1.5; }

  #legend { bottom: 16px; left: 16px; display: flex; flex-direction: column; gap: 7px; }
  #legend label {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    font-size: 12.5px; color: var(--ink); user-select: none;
  }
  #legend input { accent-color: var(--focus); margin: 0; }
  #legend input:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
  .swatch { width: 18px; height: 3px; border-radius: 2px; flex: none; }
  .swatch.dot { width: 9px; height: 9px; border-radius: 50%; }
  .count { color: var(--ink-faint); font-family: ui-monospace, Consolas, monospace; font-size: 11.5px; margin-left: auto; padding-left: 10px; font-variant-numeric: tabular-nums; }
  #legend .note { font-size: 11px; color: var(--ink-faint); max-width: 240px; line-height: 1.45; margin: 4px 0 0; }
  .ramp-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--ink-dim); padding-left: 26px; }
  .ramp { display: inline-flex; align-items: center; gap: 3px; }
  .ramp i { border-radius: 50%; display: inline-block; }
  .ramp-hint { color: var(--ink-faint); }

  #hint { top: 16px; right: 16px; font-size: 12px; color: var(--ink-dim); padding: 10px 14px; }
  #hint b { color: var(--ink); font-weight: 600; }

  #tooltip {
    position: fixed; z-index: 9; pointer-events: none; display: none;
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 8px; padding: 8px 11px; max-width: 320px;
    font-size: 12.5px; line-height: 1.5;
  }
  #tooltip .tt-type { font-size: 10.5px; letter-spacing: 0.1em; color: var(--ink-dim); text-transform: uppercase; }
  #tooltip .tt-name { font-weight: 600; }
  #tooltip .tt-sub { color: var(--ink-dim); font-size: 11.5px; }

  #detail {
    top: 70px; right: 16px; width: 300px; max-height: calc(100vh - 110px);
    display: none; flex-direction: column; padding: 0; overflow: hidden;
  }
  #detail.open { display: flex; }
  #detail header {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 13px 14px 10px; border-bottom: 1px solid var(--panel-border);
  }
  #detail header .d-head { min-width: 0; }
  #detail .d-type { font-size: 10.5px; letter-spacing: 0.1em; color: var(--ink-dim); text-transform: uppercase; }
  #detail .d-name { font-weight: 600; font-size: 14.5px; line-height: 1.4; margin-top: 2px; }
  #detail .d-path { font-size: 11.5px; color: var(--ink-dim); margin-top: 4px; line-height: 1.45; }
  #detail #d-close {
    margin-left: auto; flex: none; border: 0; background: none; cursor: pointer;
    color: var(--ink-dim); font-size: 16px; line-height: 1; padding: 2px 4px; border-radius: 5px;
  }
  #d-close:hover { color: var(--ink); }
  #d-close:focus-visible { outline: 2px solid var(--focus); }
  #detail .d-body { overflow-y: auto; padding: 8px 6px 12px 14px; }
  #detail h3 {
    font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-dim); margin: 12px 0 5px; display: flex; align-items: center; gap: 7px;
  }
  #detail h3:first-child { margin-top: 2px; }
  #detail ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 2px; }
  #detail li button {
    width: 100%; text-align: left; border: 0; background: none; cursor: pointer;
    color: var(--ink); font: inherit; font-size: 12.5px; line-height: 1.45;
    padding: 4px 8px; border-radius: 6px; display: flex; gap: 7px; align-items: baseline;
  }
  #detail li button:hover { background: var(--panel-border); }
  #detail li button:focus-visible { outline: 2px solid var(--focus); }
  #detail li .dir { flex: none; color: var(--ink-faint); font-family: ui-monospace, Consolas, monospace; font-size: 11px; }
  #detail li .raw { color: var(--ink-faint); font-size: 11px; }
  #detail .d-empty { color: var(--ink-faint); font-size: 12px; padding: 2px 8px; }

  @media (max-width: 640px) {
    #hint { display: none; }
    #title-card { max-width: 230px; }
    #detail { width: min(300px, calc(100vw - 32px)); top: auto; bottom: 16px; right: 16px; max-height: 55vh; }
  }
</style>

// ── 테마 색상 캐시 ─────────────────────────────────────────────
let C = {};
function hexLerp(a, b, t) {
  const pa = [1, 3, 5].map(i => parseInt(a.slice(i, i + 2), 16));
  const pb = [1, 3, 5].map(i => parseInt(b.slice(i, i + 2), 16));
  return "#" + pa.map((v, i) => Math.round(v + (pb[i] - v) * t).toString(16).padStart(2, "0")).join("");
}
function readTheme() {
  const s = getComputedStyle(document.documentElement);
  C = {
    bg: s.getPropertyValue("--bg").trim(),
    glow: s.getPropertyValue("--bg-glow").trim(),
    ink: s.getPropertyValue("--ink").trim(),
    inkDim: s.getPropertyValue("--ink-dim").trim(),
    concept: s.getPropertyValue("--concept").trim(),
    conceptB: s.getPropertyValue("--concept-b").trim(),
    para: s.getPropertyValue("--para").trim(),
    qna: s.getPropertyValue("--qna").trim(),
    finding: s.getPropertyValue("--finding").trim(),
    ie: s.getPropertyValue("--ie").trim(),
    bc: s.getPropertyValue("--bc").trim(),
    term: s.getPropertyValue("--term").trim(),
    e2: s.getPropertyValue("--e2").trim(),
    e3: s.getPropertyValue("--e3").trim(),
    e4: s.getPropertyValue("--e4").trim(),
    hier: s.getPropertyValue("--hier").trim(),
    cp: s.getPropertyValue("--cp").trim(),
    mix: s.getPropertyValue("--mix").trim(),
  };
  // 레벨 색 램프: 상위(얕은 level)일수록 --mix(다크=흰색/라이트=잉크) 쪽으로 밝게,
  // 하위일수록 배경 쪽으로 가라앉음. 본문=파랑 / 부록(x.5)=보라 계열.
  C.ramp = {};
  for (const lv of [1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5]) {
    const base = Number.isInteger(lv) ? C.concept : C.conceptB;
    const depth = (Math.floor(lv) - 1) / 4;           // 0(최상위) ~ 1(최하위)
    C.ramp[lv] = depth < 0.5
      ? hexLerp(base, C.mix, (0.5 - depth) * 0.9)     // 얕음 → 밝게
      : hexLerp(base, C.bg, (depth - 0.5) * 0.75);    // 깊음 → 가라앉게
  }
  // 범례 레벨 램프 점 갱신
  document.querySelectorAll(".ramp").forEach(el => {
    const levels = el.dataset.kind === "m" ? [2, 3, 4, 5] : [1.5, 2.5, 3.5, 4.5];
    el.innerHTML = levels.map((lv, i) => {
      const d = 11 - i * 2;
      return '<i style="width:' + d + 'px;height:' + d + 'px;background:' + C.ramp[lv] + '"></i>';
    }).join("");
  });
}

new MutationObserver(readTheme).observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });

const nodes = GRAPH.nodes;
const links = GRAPH.links;
const byId = new Map(nodes.map(n => [n.id, n]));
links.forEach(l => { l.a = byId.get(l.s); l.b = byId.get(l.t); });

// 인접 목록: 노드별 {상대, 간선종류, 방향, 원문표기}
const adj = new Map(nodes.map(n => [n.id, []]));
links.forEach(l => {
  adj.get(l.s).push({ other: l.b, type: l.type, dir: "out", raw: l.raw });
  adj.get(l.t).push({ other: l.a, type: l.type, dir: "in", raw: l.raw });
});

// 초기 배치: 개념은 계층 깊이별 구(球) 껍질, 문단은 소속 개념 곁
const children = new Map();
links.filter(l => l.type === "hier").forEach(l => {
  if (!children.has(l.s)) children.set(l.s, []);
  children.get(l.s).push(l.t);
});
const root = nodes.find(n => n.type === "concept" && !links.some(l => l.type === "hier" && l.t === n.id));
const GA = Math.PI * (3 - Math.sqrt(5)); // 골든앵글
let seq = 0;
function place(id, depth) {
  const n = byId.get(id);
  const r = depth * 95;
  const i = seq++;
  const y = 1 - (i % 60) / 30;
  const rad = Math.sqrt(Math.max(0, 1 - y * y));
  const th = GA * i;
  n.x = Math.cos(th) * rad * r; n.y = y * r * 0.8; n.z = Math.sin(th) * rad * r;
  (children.get(id) || []).forEach(ch => place(ch, depth + 1));
}
if (root) { root.x = root.y = root.z = 0; (children.get(root.id) || []).forEach(ch => place(ch, 1)); }
const owner = new Map();
links.filter(l => l.type === "cp").forEach(l => owner.set(l.t, l.s));
const firstPara = new Map();
links.forEach(l => { if (l.type === "case" && !firstPara.has(l.s)) firstPara.set(l.s, l.t); });
nodes.forEach(n => {
  if (n.type === "para") {
    const o = byId.get(owner.get(n.id));
    n.x = (o ? o.x : 0) + (Math.random() - 0.5) * 40;
    n.y = (o ? o.y : 0) + (Math.random() - 0.5) * 40;
    n.z = (o ? o.z : 0) + (Math.random() - 0.5) * 40;
  }
  if (n.type !== "concept" && n.type !== "para") {
    const o = byId.get(firstPara.get(n.id));
    n.x = (o && o.x || 0) + (Math.random() - 0.5) * 60;
    n.y = (o && o.y || 0) + (Math.random() - 0.5) * 60;
    n.z = (o && o.z || 0) + (Math.random() - 0.5) * 60;
  }
  n.vx = n.vy = n.vz = 0;
  // level 간 반지름 차 1.9px — root 10.1 / L2 8.2 / L3 6.3 / L4 4.4 / L5 2.9
  n.r = n.type === "concept" ? Math.max(2.9, 12 - (n.level || 3) * 1.9) : n.type === "para" ? 1.9 : n.type === "bc" ? 4.2 : n.type === "term" ? 1.6 : 2.5;
});

// ── 물리 시뮬레이션 ────────────────────────────────────────────
const REST = { hier: 70, cp: 22, e2: 130, e3: 90, e4: 80, case: 34, example: 60, bc2: 55, bc3: 70, term: 28 };
const STIFF = { hier: 0.05, cp: 0.08, e2: 0.03, e3: 0.006, e4: 0.02, case: 0.02, example: 0.015, bc2: 0.02, bc3: 0.008, term: 0.03 };
let alpha = 1;
function tick() {
  // 반발력
  for (let i = 0; i < nodes.length; i++) {
    const a = nodes[i];
    for (let j = i + 1; j < nodes.length; j++) {
      const b = nodes[j];
      let dx = a.x - b.x, dy = a.y - b.y, dz = a.z - b.z;
      let d2 = dx * dx + dy * dy + dz * dz + 1;
      if (d2 > 90000) continue;
      const bothC = a.type === "concept" && b.type === "concept";
      const k = (bothC ? 900 : 140) / d2;
      const d = Math.sqrt(d2);
      dx /= d; dy /= d; dz /= d;
      a.vx += dx * k; a.vy += dy * k; a.vz += dz * k;
      b.vx -= dx * k; b.vy -= dy * k; b.vz -= dz * k;
    }
  }
  // 스프링
  for (const l of links) {
    const { a, b } = l;
    let dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
    const d = Math.sqrt(dx * dx + dy * dy + dz * dz) + 0.01;
    const f = (d - REST[l.type]) * STIFF[l.type];
    dx /= d; dy /= d; dz /= d;
    a.vx += dx * f; a.vy += dy * f; a.vz += dz * f;
    b.vx -= dx * f; b.vy -= dy * f; b.vz -= dz * f;
  }
  // 중심 인력 + 감쇠 + 적분
  for (const n of nodes) {
    n.vx -= n.x * 0.0012; n.vy -= n.y * 0.0012; n.vz -= n.z * 0.0012;
    n.x += n.vx * alpha; n.y += n.vy * alpha; n.z += n.vz * alpha;
    n.vx *= 0.86; n.vy *= 0.86; n.vz *= 0.86;
  }
  if (alpha > 0.05) alpha *= 0.995;
}

// ── 렌더링 ─────────────────────────────────────────────────────
const cv = document.getElementById("stage");
const ctx = cv.getContext("2d");
let W, H, DPR;
function resize() {
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = innerWidth; H = innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  cv.style.width = W + "px"; cv.style.height = H + "px";
}
resize(); addEventListener("resize", resize);

let yaw = 0.5, pitch = 0.25, zoom = 1.15, autoSpin = !REDUCED;
const FOV = 900;
function project(n) {
  const cy = Math.cos(yaw), sy = Math.sin(yaw);
  const cp_ = Math.cos(pitch), sp = Math.sin(pitch);
  let x = n.x * cy + n.z * sy;
  let z = -n.x * sy + n.z * cy;
  let y = n.y * cp_ - z * sp;
  z = n.y * sp + z * cp_;
  const s = FOV / (FOV + z + 350) * zoom;
  return { x: W / 2 + x * s, y: H / 2 + y * s, s, z };
}

const show = { concept: true, para: true, qna: true, finding: true, ie: true, bc: true, term: false, hier: true, e2: true, e3: true, e4: true, cp: true, case: true, example: true, bc2: true, bc3: true };

// ── 선택 상태 + 상세 패널 ──────────────────────────────────────
let selected = null, neighborIds = new Set();
const SECTION_LABEL = {
  hier: "계층 (목차)", cp: "관할 문단 / 소속 개념", case: "사례 ↔ 근거 문단",
  example: "공식 예시 (IE 목차)", bc2: "결론 근거 (BC 목차)", bc3: "사례가 참조한 BC",
  term: "용어 진입 (사전)",
  e2: "E2 선행판단", e3: "E3 상호참조", e4: "E4 본문↔부록B",
};
const DIR_LABEL = {
  hier: { out: "하위", in: "상위" }, cp: { out: "관할", in: "소속" },
  e2: { out: "다음 판단", in: "먼저 판단" }, e3: { out: "참조 →", in: "← 피참조" },
  e4: { out: "본문 원칙", in: "상세 지침" },
  case: { out: "근거 문단", in: "관련 사례" },
  example: { out: "예시하는 개념", in: "공식 예시" },
  bc2: { out: "근거하는 개념", in: "결론 근거" },
  bc3: { out: "참조 BC", in: "참조한 사례" },
  term: { out: "진입 후보", in: "진입 용어" },
};
function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;"); }
function select(node) {
  selected = node;
  neighborIds = new Set();
  const panel = document.getElementById("detail");
  if (!node) { panel.classList.remove("open"); return; }
  adj.get(node.id).forEach(e => neighborIds.add(e.other.id));
  document.getElementById("d-type").textContent =
    node.type === "concept" ? "개념 · level " + node.level + (node.ref ? " · 문단 " + node.ref : "") : ({ concept: "개념", para: "문단", qna: "QNA 질의회신", finding: "감리지적사례", ie: "IE 적용사례", bc: "BC 결론도출근거 그룹", term: "용어 (진입 후보)" })[node.type] + (node.section ? " · " + node.section : "");
  document.getElementById("d-name").textContent = node.label;
  document.getElementById("d-path").textContent =
    node.type === "concept" ? (node.path || "") : node.type === "para" ? "소속: " + (node.owner || "") : (node.caseid || "");
  const groups = {};
  for (const e of adj.get(node.id)) (groups[e.type] = groups[e.type] || []).push(e);
  let html = "";
  for (const t of ["hier", "cp", "case", "example", "bc2", "bc3", "term", "e2", "e3", "e4"]) {
    if (!groups[t]) continue;
    html += '<h3><span class="swatch" style="background:var(--' + (t === "cp" ? "hier" : t === "case" ? "qna" : t === "example" ? "ie" : (t === "bc2" || t === "bc3") ? "bc" : t === "term" ? "term" : t) + ')"></span>' +
      SECTION_LABEL[t] + " · " + groups[t].length + "</h3><ul>";
    for (const e of groups[t].slice(0, 60)) {
      html += '<li><button data-id="' + esc(e.other.id) + '"><span class="dir">' + DIR_LABEL[t][e.dir] + "</span>" +
        "<span>" + esc(e.other.label) +
        (e.raw && t !== "cp" ? ' <span class="raw">(' + esc(e.raw) + ")</span>" : "") + "</span></button></li>";
    }
    if (groups[t].length > 60) html += '<li class="d-empty">… 외 ' + (groups[t].length - 60) + "개</li>";
    html += "</ul>";
  }
  document.getElementById("d-body").innerHTML = html || '<p class="d-empty">연결 없음</p>';
  panel.classList.add("open");
}
document.getElementById("d-close").addEventListener("click", () => select(null));
document.getElementById("d-body").addEventListener("click", e => {
  const btn = e.target.closest("button[data-id]");
  if (btn) select(byId.get(btn.dataset.id));
});
function linkVisible(l) {
  if (!show[l.type] && l.type !== "cp") return false;
  const aOk = show[l.a.type];
  const bOk = show[l.b.type];
  return aOk && bOk;
}
let hover = null;
function draw() {
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, W, H);
  const g = ctx.createRadialGradient(W / 2, H / 2, 60, W / 2, H / 2, Math.max(W, H) * 0.7);
  g.addColorStop(0, C.glow); g.addColorStop(1, C.bg);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  const P = new Map();
  for (const n of nodes) P.set(n.id, project(n));

  const EDGE = { hier: [C.hier, 0.5, 1], cp: [C.cp, 0.3, 0.6], term: [C.term, 0.3, 0.6], case: [C.qna, 0.16, 0.6], bc3: [C.bc, 0.25, 0.7], example: [C.ie, 0.5, 1.2], bc2: [C.bc, 0.6, 1.3], e3: [C.e3, 0.42, 1], e4: [C.e4, 0.9, 1.6], e2: [C.e2, 0.95, 2.4] };
  for (const bright of [false, true]) {           // 선택 시 2패스: 배경(dim) → 강조
    for (const t of ["cp", "term", "case", "bc3", "example", "bc2", "hier", "e3", "e4", "e2"]) {
      ctx.beginPath();
      let any = false;
      for (const l of links) {
        if (l.type !== t || !linkVisible(l)) continue;
        const touches = selected && (l.s === selected.id || l.t === selected.id);
        if (bright !== !!touches) continue;
        const pa = P.get(l.s), pb = P.get(l.t);
        ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y);
        any = true;
      }
      if (!any) continue;
      if (bright) {
        // 선택 노드의 연결선: 잉크 밑줄 + 진한 원색을 최상위에 — 옅어서 안 보이는 문제 방지
        ctx.strokeStyle = C.ink; ctx.lineWidth = EDGE[t][2] + 2.4; ctx.globalAlpha = 0.28;
        ctx.stroke();
        ctx.strokeStyle = EDGE[t][0]; ctx.lineWidth = EDGE[t][2] + 1.2; ctx.globalAlpha = 1;
        ctx.stroke();
      } else {
        ctx.strokeStyle = EDGE[t][0];
        ctx.lineWidth = EDGE[t][2];
        ctx.globalAlpha = selected ? EDGE[t][1] * 0.08 : EDGE[t][1];
        ctx.stroke();
      }
    }
    if (!selected) break;                          // 미선택이면 1패스로 끝
  }
  ctx.globalAlpha = 1;

  const sorted = [...nodes].sort((a, b) => P.get(b.id).z - P.get(a.id).z);
  for (const n of sorted) {
    if (!show[n.type]) continue;
    const p = P.get(n.id);
    const isSel = n === selected, isNb = neighborIds.has(n.id);
    const r = n.r * p.s * (n === hover || isSel ? 1.7 : 1);
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.6, r), 0, 7);
    ctx.fillStyle = n.type === "concept" ? (C.ramp[n.level] || C.concept) : (C[n.type] || C.para);
    let a = Math.min(1, Math.max(0.25, p.s));
    if (selected && !isSel && !isNb) a *= 0.13;
    ctx.globalAlpha = a;
    ctx.fill();
    if (n === hover || isSel) { ctx.strokeStyle = C.ink; ctx.lineWidth = isSel ? 1.8 : 1.2; ctx.globalAlpha = 1; ctx.stroke(); }
  }
  ctx.globalAlpha = 1;

  // 라벨: 상위 개념 상시 + 선택 시 선택 노드·이웃
  ctx.font = "11.5px 'Segoe UI', 'Malgun Gothic', sans-serif";
  ctx.textAlign = "center";
  for (const n of nodes) {
    if (!show[n.type]) continue;
    const isSel = n === selected, isNb = neighborIds.has(n.id);
    const topConcept = n.type === "concept" && (n.level || 9) <= 2.5;
    if (!topConcept && !isSel && !isNb) continue;
    const p = P.get(n.id);
    ctx.fillStyle = isSel || isNb ? C.ink : C.inkDim;
    let a = Math.min(0.95, Math.max(0.3, p.s - 0.1));
    if (selected && !isSel && !isNb) a *= 0.15;
    if (isNb) a = Math.max(a, 0.9);  // 연결 상대는 멀리 있어도 라벨이 또렷하게
    ctx.globalAlpha = a;
    ctx.fillText(n.label.length > 14 ? n.label.slice(0, 13) + "…" : n.label, p.x, p.y - n.r * p.s - 6);
  }
  ctx.globalAlpha = 1;
}

// ── 인터랙션 ───────────────────────────────────────────────────
let dragging = false, px = 0, py = 0, idleTimer = 0, downX = 0, downY = 0;
function pick(x, y) {
  let best = null, bd = 144;
  for (const n of nodes) {
    if (!show[n.type]) continue;
    const p = project(n);
    const dx = p.x - x, dy = p.y - y;
    const d2 = dx * dx + dy * dy;
    if (d2 < bd) { bd = d2; best = n; }
  }
  return best;
}
cv.addEventListener("pointerdown", e => { dragging = true; px = downX = e.clientX; py = downY = e.clientY; cv.classList.add("dragging"); cv.setPointerCapture(e.pointerId); });
addEventListener("pointerup", e => {
  if (dragging && Math.hypot(e.clientX - downX, e.clientY - downY) < 5) {
    select(pick(e.clientX, e.clientY));   // 클릭(드래그 아님) → 선택/해제
  }
  dragging = false; cv.classList.remove("dragging");
});
cv.addEventListener("pointermove", e => {
  if (dragging) {
    yaw += (e.clientX - px) * 0.005; pitch += (e.clientY - py) * 0.005;
    pitch = Math.max(-1.4, Math.min(1.4, pitch));
    px = e.clientX; py = e.clientY;
    autoSpin = false; clearTimeout(idleTimer);
    idleTimer = setTimeout(() => { autoSpin = !REDUCED; }, 6000);
  } else {
    let best = null, bd = 144;
    for (const n of nodes) {
      if (!show[n.type]) continue;
      const p = project(n);
      const dx = p.x - e.clientX, dy = p.y - e.clientY;
      const d2 = dx * dx + dy * dy;
      if (d2 < bd) { bd = d2; best = n; }
    }
    hover = best;
    const tt = document.getElementById("tooltip");
    if (best) {
      const type = best.type === "concept" ? "개념 · level " + best.level + (best.ref ? " · 문단 " + best.ref : "") : ({ concept: "개념", para: "문단", qna: "QNA 질의회신", finding: "감리지적사례", ie: "IE 적용사례", bc: "BC 결론도출근거 그룹", term: "용어 (진입 후보)" })[best.type];
      tt.innerHTML = '<div class="tt-type">' + type + "</div>" +
        '<div class="tt-name">' + best.label + "</div>" +
        (best.type === "para" ? '<div class="tt-sub">소속: ' + (best.owner || "") + "</div>" : '<div class="tt-sub">' + (best.section || best.caseid || "") + "</div>");
      tt.style.display = "block";
      tt.style.left = Math.min(W - 340, e.clientX + 14) + "px";
      tt.style.top = (e.clientY + 14) + "px";
    } else tt.style.display = "none";
  }
});
cv.addEventListener("wheel", e => { e.preventDefault(); zoom *= e.deltaY < 0 ? 1.1 : 0.9; zoom = Math.max(0.3, Math.min(5, zoom)); }, { passive: false });
cv.addEventListener("dblclick", () => { yaw = 0.5; pitch = 0.25; zoom = 1.15; alpha = Math.max(alpha, 0.3); });

// 토글
for (const [id, key] of [["t-concept", "concept"], ["t-para", "para"], ["t-qna", "qna"], ["t-finding", "finding"], ["t-ie", "ie"], ["t-hier", "hier"], ["t-e2", "e2"], ["t-e3", "e3"], ["t-e4", "e4"], ["t-example", "example"], ["t-bc", "bc"], ["t-term", "term"]]) {
  document.getElementById(id).addEventListener("change", e => { show[key] = e.target.checked; });
}

// 카운트 표기
const m = GRAPH.meta;
document.getElementById("m-concepts").textContent = m.concepts;
document.getElementById("m-paras").textContent = m.paras;
document.getElementById("m-cases").textContent = m.cases;
document.getElementById("m-bc").textContent = m.bc || 0;
document.getElementById("m-terms").textContent = m.terms || 0;
document.getElementById("m-links").textContent = Object.values(m.links).reduce((a, b) => a + b, 0);
document.getElementById("c-concept").textContent = m.concepts;
document.getElementById("c-para").textContent = m.paras;
document.getElementById("c-qna").textContent = m.links && "101";
document.getElementById("c-finding").textContent = "23";
document.getElementById("c-ie").textContent = "65";
document.getElementById("c-example").textContent = m.links.example || 0;
document.getElementById("c-bc").textContent = m.bc || 0;
document.getElementById("c-term").textContent = m.terms || 0;
document.getElementById("c-hier").textContent = m.links.hier + "+" + m.links.cp;
document.getElementById("c-e2").textContent = m.links.e2;
document.getElementById("c-e3").textContent = m.links.e3;
document.getElementById("c-e4").textContent = m.links.e4;

// ── 루프 ───────────────────────────────────────────────────────
(function loop() {
  if (autoSpin && !dragging) yaw += 0.0016;
  tick();
  draw();
  requestAnimationFrame(loop);
})();
</script>
